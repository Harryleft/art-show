<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://images.metmuseum.org https://collectionapi.metmuseum.org; style-src 'self'; script-src 'self'; connect-src 'self' https://collectionapi.metmuseum.org;">
  <title>Art Show</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="widget">
    <div id="drag-handle"></div>

    <div id="artwork-container">
      <img id="artwork-img" src="" alt="">
      <div id="loading">
        <div class="spinner"></div>
      </div>
      <div id="error-overlay" class="hidden">
        <span>&#127912;</span>
        <p>Loading artwork...</p>
      </div>

      <div id="info-overlay">
        <h3 id="art-title"></h3>
        <div id="art-artist" class="info-line"></div>
        <div id="art-medium" class="info-line sub"></div>
        <div id="art-museum" class="museum-badge"></div>
      </div>
    </div>

    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
